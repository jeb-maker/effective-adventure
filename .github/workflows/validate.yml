name: Validate

on:
  push:
    branches:
      - main
      - "cursor/*"
  pull_request:
    branches:
      - main
      - "cursor/*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Catalogue gate (validate + listicle + revues)
        run: python3 scripts/catalogue_saas.py gate
