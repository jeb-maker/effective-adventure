name: Validate

on:
  push:
    branches:
      - main
      - "cursor/*"
  pull_request:
    branches:
      - main
      - "cursor/*"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate catalogue SaaS
        run: python3 scripts/catalogue_saas.py validate

      - name: Check idees revues
        run: python3 scripts/check_idees.py

      - name: Audit listicle sources (aperçu)
        run: python3 scripts/catalogue_saas.py audit-sources | head
